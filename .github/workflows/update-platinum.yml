yaml
name: プラチナ価格 自動更新

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests beautifulsoup4

      - name: プラチナ価格を取得してHTMLを更新
        run: python fetch_platinum.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 プラチナ価格を自動更新 $(date +'%Y/%m/%d %H:%M JST')"
          git push
