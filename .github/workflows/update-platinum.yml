name: プラチナ価格 自動更新

on:
  schedule:
    # 毎営業日 09:45 JST (00:45 UTC)
    - cron: '45 0 * * 1-5'
    # 毎営業日 14:00 JST (05:00 UTC)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:  # 手動実行ボタンも使えるようにする

permissions:
  contents: write  # ← これが重要！書き込み権限

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests beautifulsoup4

      - name: プラチナ価格を取得・HTMLを更新
        run: python fetch_platinum.py

      - name: 変更をGitHubにプッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 価格自動更新: $(date '+%Y/%m/%d %H:%M') JST"
          git push
