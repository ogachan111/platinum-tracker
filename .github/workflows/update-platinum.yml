name: platinum-update

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install-libs
        run: pip install requests beautifulsoup4

      - name: fetch-price
        run: python fetch_platinum.py

      - name: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html
          git diff --staged --quiet || git commit -m "auto update"
          git push
